# === 服务器身份 ===
# 二进制名: chatserver_<short_name>_<version> = chatserver_lwj_1.0
# 试题约定: x 为奇数表示开发版, y 为 bug 修复计数
server_name = chatserver
short_name  = lwj
version     = 1.0

# === 路径（2026 试题）===
# 公共 FIFO 目录 FIFOFILES = ~/Server/fifo
fifo_dir        = /home/liwenjun2023150001/Server/fifo
# 客户端私有 FIFO 目录（试题未显式命名，但客户端仍需要，故配置化）
client_fifo_dir = /home/liwenjun2023150001/Client/fifo
# 日志目录 LOGFILES = ~/log/chat-logs
log_dir         = /home/liwenjun2023150001/log/chat-logs

# === FIFO 命名前缀 ===
# 派生: lwj_reg_fifo / lwj_login_fifo / lwj_msg_fifo / lwj_logout_fifo
fifo_prefix = lwj

# === 线程池 POOLSIZE ===
# 试题要求启动时创建 100 个工作线程
poolsize    = 100
